events {}

http {
  upstream backend_service {
    server backend:8000;
  }

  upstream users_service {
    server users-api:8000;
  }

  server {
    listen 80;
    client_max_body_size 10m;

    location /users-docs {
      proxy_pass http://users_service/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /backend-docs {
      proxy_pass http://backend_service/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /users-openapi.json {
      proxy_pass http://users_service/openapi.json;
      proxy_set_header Host $host;
    }

    location /backend-openapi.json {
      proxy_pass http://backend_service/openapi.json;
      proxy_set_header Host $host;
    }

    location = /api/user {
      proxy_pass http://users_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users {
      proxy_pass http://users_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://backend_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
