version: "3.9"

services:
  db-main:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MAIN_DB}
    volumes:
      - db_main_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_MAIN_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [internal]

  db-users:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USERS_DB}
    volumes:
      - db_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_USERS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  push-notificator:
    image: ghcr.io/ayusavin/push-notification-playground:1.0.0
    ports:
      - "8000:8000"
    networks: [internal]

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db-main:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  users-api:
    build: ./users_service
    env_file: .env
    depends_on:
      db-users:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      db-main:
        condition: service_healthy
      db-users:
        condition: service_healthy
      redis:
        condition: service_healthy
      push-notificator:
        condition: service_started
    networks: [internal]

  api-gateway:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      users-api:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  db_main_data:
  db_users_data:
  redis_data:
